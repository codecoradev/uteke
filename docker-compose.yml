services:
  uteke:
    image: ghcr.io/codecoradev/uteke:latest
    container_name: uteke
    ports:
      - "${UTEKE_PORT:-8767}:8767"
    volumes:
      - uteke-data:/data
    environment:
      # Auth (optional — set UTEKE_AUTH_TOKEN env var to enable)
      # - UTEKE_AUTH_TOKEN
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8767/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  uteke-data:
