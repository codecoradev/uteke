# cora code review config for uteke
provider:
  provider: freemodel
  model: gpt-5.4
  base_url: https://api.freemodel.dev/v1

focus:
  - security
  - performance
  - bugs
  - best_practice

ignore:
  files:
    - "target/**"
    - "website/node_modules/**"
    - "website/.svelte-kit/**"
    - "*.lock"
    - "Cargo.lock"

hook:
  mode: warn
  min_severity: major
  max_diff_size: 51200
