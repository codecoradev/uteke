name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-main:
    name: Sync main branch
    runs-on: ubuntu-latest
    # Only runs on v* tag pushes (release trigger). Uses force-push because main
    # is a release-only mirror of develop — any commits on main not in develop
    # are stale snapshots that should be overwritten by the current release.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Push to main
        run: |
          git push origin HEAD:main --force
          echo "✅ main synced to develop at ${{ github.sha }}"

  build-release:
    needs: sync-main
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: uteke-x86_64-unknown-linux-gnu
            ext: tar.gz
          # Linux ARM64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: uteke-aarch64-unknown-linux-gnu
            ext: tar.gz
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: uteke-aarch64-apple-darwin
            ext: tar.gz
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: uteke-x86_64-pc-windows-msvc
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p uteke-cli -p uteke-server

      - name: Strip binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/uteke || true
          strip target/${{ matrix.target }}/release/uteke-serve || true

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/uteke release/uteke
          cp target/${{ matrix.target }}/release/uteke-serve release/uteke-serve
          cd release
          tar czf "${{ matrix.artifact }}-${{ steps.version.outputs.VERSION }}.${{ matrix.ext }}" uteke uteke-serve

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir release
          cp target/${{ matrix.target }}/release/uteke.exe release/uteke.exe
          cp target/${{ matrix.target }}/release/uteke-serve.exe release/uteke-serve.exe
          cd release
          7z a "${{ matrix.artifact }}-${{ steps.version.outputs.VERSION }}.${{ matrix.ext }}" uteke.exe uteke-serve.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-${{ steps.version.outputs.VERSION }}
          path: release/${{ matrix.artifact }}-${{ steps.version.outputs.VERSION }}.${{ matrix.ext }}

  release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la release-artifacts/

      - name: Generate SHA256 checksums
        run: |
          cd release-artifacts
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VER="${{ steps.version.outputs.VERSION }}"
          CLEAN_VER="${VER#v}"
          awk "/^## \[${CLEAN_VER}\]/{found=1; next} /^## \[/{found=0} found && !/^\[.*\]: https:/" CHANGELOG.md > changelog-body.md
          if [ ! -s changelog-body.md ]; then
            echo "::warning::No CHANGELOG section found for [${CLEAN_VER}]"
            echo "No changelog entry found for this version." > changelog-body.md
          fi
          echo "CLEAN_VER=${CLEAN_VER}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          VER="${{ steps.version.outputs.VERSION }}"
          echo "## What's New in ${VER}" > release-notes.md
          echo "" >> release-notes.md
          cat changelog-body.md >> release-notes.md
          echo "" >> release-notes.md
          printf '### 📦 Binaries\n\nEach archive contains **two binaries**:\n- `uteke` — CLI tool\n- `uteke-serve` — HTTP server daemon\n\n' >> release-notes.md
          printf '| Platform | File |\n|----------|------|\n' >> release-notes.md
          printf '| Linux (x86_64) | `uteke-%s-x86_64-unknown-linux-gnu.tar.gz` |\n' "${VER}" >> release-notes.md
          printf '| Linux (ARM64) | `uteke-%s-aarch64-unknown-linux-gnu.tar.gz` |\n' "${VER}" >> release-notes.md
          printf '| macOS (Apple Silicon) | `uteke-%s-aarch64-apple-darwin.tar.gz` |\n' "${VER}" >> release-notes.md
          printf '| Windows (x86_64) | `uteke-%s-x86_64-pc-windows-msvc.zip` |\n\n' "${VER}" >> release-notes.md
          printf '### 🚀 Quick Start\n\n```bash\n# Quick install (Linux / macOS)\ncurl -fsSL https://raw.githubusercontent.com/ajianaz/uteke/main/install.sh | sh\n\n# Pin a specific version\nUTEKE_VERSION=v%s curl -fsSL https://raw.githubusercontent.com/ajianaz/uteke/main/install.sh | sh\n\n# Store a memory\nuteke remember "Important context" --tags project\n\n# Recall by meaning\nuteke recall "what was that context?"\n\n# Start server for fast AI agent access\nuteke-serve --port 8767\n```\n\n' >> release-notes.md
          printf '**Full changelog:** https://github.com/ajianaz/uteke/blob/main/CHANGELOG.md\n' >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body_path: release-notes.md
          files: release-artifacts/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & Push Docker Image
    needs: [build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux binaries from build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: uteke-*-${{ github.ref_name }}
          path: release-artifacts
          merge-multiple: true

      - name: Extract binaries for Docker context
        run: |
          mkdir -p binaries
          # Artifacts are uploaded as release/*.tar.gz, so find them recursively
          cd release-artifacts
          AMD64=$(find . -name "uteke-x86_64-unknown-linux-gnu-${{ github.ref_name }}.tar.gz" | head -1)
          ARM64=$(find . -name "uteke-aarch64-unknown-linux-gnu-${{ github.ref_name }}.tar.gz" | head -1)
          if [ -z "$AMD64" ] || [ -z "$ARM64" ]; then
            echo "::error::Linux binary artifacts not found"
            echo "Available files:" && find . -type f | head -20
            exit 1
          fi
          tar xzf "$AMD64" -C ../binaries
          mv ../binaries/uteke ../binaries/uteke-amd64
          mv ../binaries/uteke-serve ../binaries/uteke-serve-amd64
          tar xzf "$ARM64" -C ../binaries
          mv ../binaries/uteke ../binaries/uteke-arm64
          mv ../binaries/uteke-serve ../binaries/uteke-serve-arm64
          chmod +x ../binaries/*
          ls -lh ../binaries/

      - name: Download embedding model
        run: |
          mkdir -p models/onnx
          curl -fSL --retry 3 --retry-delay 5 \
            -o models/onnx/model_q4.onnx \
            "https://huggingface.co/onnx-community/embeddinggemma-300m-ONNX/resolve/main/onnx/model_q4.onnx"
          curl -fSL --retry 3 --retry-delay 5 \
            -o models/onnx/model_q4.onnx_data \
            "https://huggingface.co/onnx-community/embeddinggemma-300m-ONNX/resolve/main/onnx/model_q4.onnx_data"
          curl -fSL --retry 3 --retry-delay 5 \
            -o models/tokenizer.json \
            "https://huggingface.co/onnx-community/embeddinggemma-300m-ONNX/resolve/main/tokenizer.json"
          ls -lh models/onnx/ models/tokenizer.json

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          build-args: |
            VERSION=${{ github.ref_name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
